<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motion Math — Full Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="cv.js"></script>
  <script src="aruco.js"></script>
  <script src="motionTracker.js"></script>
  <script src="units.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --accent:    #00e5ff;
      --accent2:   #ff4081;
      --accent3:   #69f0ae;
      --accent4:   #ffd740;
      --text:      #e8eaf6;
      --muted:     #7986cb;
      --border:    #2e3356;
      --slope-pos: #69f0ae;
      --slope-neg: #ff4081;
      --slope-zero:#ffd740;
      --left-w:    280px;
      --right-w:   200px;
    }

    /* Light theme — overrides the same variable names so nothing else
       in this stylesheet needs to know which theme is active. */
    html[data-theme="light"] {
      --bg:        #f4f5fa;
      --surface:   #ffffff;
      --surface2:  #eceef7;
      --accent:    #0077b6;
      --accent2:   #c2185b;
      --accent3:   #2e7d32;
      --accent4:   #e0982a;
      --text:      #1a1d27;
      --muted:     #5c6bc0;
      --border:    #d0d3e6;
      --slope-pos: #2e7d32;
      --slope-neg: #c2185b;
      --slope-zero:#e0982a;
    }
    body { transition: background 0.2s, color 0.2s; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── HEADER ── */
    #header {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 7px 14px; background: var(--surface);
      border-bottom: 2px solid var(--accent); flex-shrink: 0; z-index: 10;
    }
    #header h1 { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; flex: 1; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .status-dot.active    { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
    .status-dot.recording { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 0.8s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .hdr-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 7px; padding: 5px 12px; font-size: 0.72rem; font-family: 'Space Mono', monospace;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: all 0.15s; flex-shrink: 0; letter-spacing: 0.5px;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn.back  { color: var(--muted); }
    .hdr-btn.help-btn {
      width: 24px; height: 24px; padding: 0; justify-content: center;
      border-radius: 50%; font-weight: 700; text-decoration: none;
    }
    .hdr-btn.stacked {
      flex-direction: column; gap: 1px; padding: 3px 12px; line-height: 1.3;
    }
    .hdr-btn.stacked span { font-size: 0.6rem; letter-spacing: 1px; }
    .hdr-btn.stacked b    { font-size: 0.8rem; color: var(--accent); }

    .hdr-group { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
    .hdr-group-label {
      font-family: 'Space Mono', monospace; font-size: 0.55rem; color: var(--muted);
      letter-spacing: 1.5px; text-transform: uppercase; padding-left: 2px;
    }
    .hdr-group-btns { display: flex; gap: 6px; }
    .hdr-divider { align-self: stretch; width: 1px; background: var(--border); margin: 2px 0; }
    .hidden { display: none !important; }

    /* ── CONTENT ── */
    #content { display: flex; flex: 1; overflow: hidden; }

    /* ── LEFT: VIDEO ── */
    #videoCol {
      width: var(--left-w); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 6px; padding: 8px;
    }
    #videoWrapper {
      position: relative; background: #000; border-radius: 10px;
      overflow: hidden; border: 3px solid var(--border); flex: 1;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    #video   { width: 100%; height: 100%; object-fit: cover; display: block; }
    #overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
    #distBadge {
      position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); border: 1px solid var(--accent); border-radius: 20px;
      padding: 4px 14px; font-family: 'Space Mono', monospace; font-size: 0.85rem;
      color: var(--accent); white-space: nowrap; pointer-events: none;
    }
    #camPlaceholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.7rem; text-align: center; padding: 12px;
    }
    .cam-icon { font-size: 2.5rem; opacity: 0.3; }

    /* countdown */
    #countdownOverlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55); z-index: 20; border-radius: 8px;
    }
    #countdownOverlay.visible { display: flex; }
    #countdownNum {
      font-family: 'Space Mono', monospace; font-size: 6rem; font-weight: 700;
      color: #fff; text-shadow: 0 0 40px var(--accent); line-height: 1;
      animation: pop 1s ease-out infinite;
    }
    #countdownNum.go { font-size: 4rem; color: var(--accent3); animation: popgo 0.8s ease-out forwards; }
    @keyframes pop   { 0%{transform:scale(1.3);opacity:1} 70%{transform:scale(1);opacity:1} 100%{transform:scale(0.92);opacity:0.5} }
    @keyframes popgo { 0%{transform:scale(1.5);opacity:0.2} 30%{transform:scale(1);opacity:1} 100%{transform:scale(1);opacity:1} }

    /* ── CONTROLS BELOW VIDEO ── */
    #controls {
      display: flex; gap: 6px; flex-shrink: 0;
    }

    .ctrl-btn {
      flex: 1; padding: 9px 6px; border-radius: 8px; border: 1px solid var(--border);
      font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
      transition: all 0.15s;
    }
    #startBtn.cam-pending { background: rgba(0,229,255,0.1);  color: var(--accent);  border-color: rgba(0,229,255,0.3); }
    #startBtn.cam-pending:hover { background: rgba(0,229,255,0.2); }
    #startBtn   { background: rgba(105,240,174,0.1); color: var(--accent3); border-color: rgba(105,240,174,0.3); }
    #startBtn:hover:not(:disabled)   { background: rgba(105,240,174,0.2); }
    #startBtn:disabled { opacity: 0.4; cursor: default; }
    #clearBtn   { background: rgba(255,64,129,0.08); color: var(--accent2); border-color: rgba(255,64,129,0.25); }
    #clearBtn:hover { background: rgba(255,64,129,0.16); }

    /* ── CHART AREA ── */
    #chartArea {
      flex: 1; display: flex; flex-direction: column; padding: 8px; overflow: hidden; position: relative;
    }
    #chartWrap { flex: 1; position: relative; }

    /* ── DISTANCE OVERLAY (on chart, upper-right) ── */
    #distOverlay {
      position: absolute; top: 10px; right: 10px;
      background: rgba(26,29,39,0.88); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; display: flex; flex-direction: column; align-items: center; gap: 4px;
      z-index: 5; cursor: grab; touch-action: none; user-select: none;
    }
    #distReadout {
      font-family: 'Space Mono', monospace; font-size: 4rem; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    #distUnit { font-family: 'Space Mono', monospace; font-size: 0.85rem; color: var(--muted); text-align: center; }

    /* ── SLOPE GAUGE OVERLAY (on chart, upper-left — optional, toggled) ── */
    #slopeOverlay {
      position: absolute; top: 10px; left: 10px;
      background: rgba(26,29,39,0.88); border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 12px; display: flex; flex-direction: column; align-items: center; gap: 2px;
      z-index: 5; cursor: grab; touch-action: none; user-select: none;
    }
    #arrowCanvas { width: 90px; height: 90px; }
    #slopeReadout {
      font-family: 'Space Mono', monospace; font-size: 1.2rem; font-weight: 700; line-height: 1;
    }
    #slopeReadout.pos  { color: var(--slope-pos); }
    #slopeReadout.neg  { color: var(--slope-neg); }
    #slopeReadout.zero { color: var(--slope-zero); }
    #slopeDirLabel {
      font-family: 'Space Mono', monospace; font-size: 0.58rem;
      color: var(--muted); text-align: center; letter-spacing: 0.5px;
    }

    /* ── DATA TABLE (toggleable, reuses the space the old gauge column had) ── */
    #tableCol {
      width: var(--right-w); flex-shrink: 0;
      display: flex; flex-direction: column; padding: 8px; gap: 6px;
    }
    #tableScroll {
      flex: 1; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    }
    #dataTable { width: 100%; border-collapse: collapse; font-family: 'Space Mono', monospace; font-size: 0.75rem; }
    #dataTable thead th {
      position: sticky; top: 0; z-index: 2;
      padding: 8px 10px; background: var(--surface2); color: var(--accent);
      font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase;
      border-bottom: 2px solid var(--accent); text-align: right;
    }
    #dataTable th:first-child, #dataTable td:first-child {
      border-right: 2px solid var(--border); text-align: center;
    }
    #dataTable td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); text-align: right; }
    #dataTable tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
    #dataTable tr:last-child td { color: var(--accent); font-weight: 700; }

    /* ── NO SESSION BANNER ── */
    #noSetupBanner {
      display: none; position: absolute; inset: 0; z-index: 100;
      background: rgba(15,17,23,0.95); align-items: center; justify-content: center;
      flex-direction: column; gap: 16px; text-align: center; padding: 24px;
    }
    #noSetupBanner.visible { display: flex; }
    #noSetupBanner h2 { font-family: 'Space Mono', monospace; font-size: 1rem; color: var(--accent); }
    #noSetupBanner p  { font-size: 0.85rem; color: var(--muted); max-width: 280px; line-height: 1.6; }
    #noSetupBanner a  {
      font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--bg);
      background: var(--accent); border-radius: 8px; padding: 10px 24px;
      text-decoration: none; letter-spacing: 1px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <a class="hdr-btn back" href="index.html">← Home</a>
    <h1>Full Lab</h1>
    <div class="status-dot" id="statusDot"></div>

    <div class="hdr-group">
      <span class="hdr-group-label">Inputs (x)</span>
      <div class="hdr-group-btns">
        <button class="hdr-btn stacked" id="tableIntervalBtn" type="button"><span>Every</span><b>1s</b></button>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-group">
      <span class="hdr-group-label">Outputs (y)</span>
      <div class="hdr-group-btns">
        <button class="hdr-btn stacked" id="unitsBtn" type="button"><span>Units</span><b>ft</b></button>
        <button class="hdr-btn stacked" id="negTimeBtn" type="button"><span>-3s</span><b>Off</b></button>
        <button class="hdr-btn stacked" id="graphModeBtn" type="button"><span>Graph</span><b>Dist</b></button>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-group">
      <span class="hdr-group-label">Data</span>
      <div class="hdr-group-btns">
        <button class="hdr-btn stacked" id="tableBtn" type="button"><span>Table</span><b>Off</b></button>
        <button class="hdr-btn stacked" id="slopeGaugeBtn" type="button"><span>Slope</span><b>Off</b></button>
        <button class="hdr-btn stacked" id="gaugeBtn" type="button"><span>Distance</span><b>Off</b></button>
      </div>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-group">
      <span class="hdr-group-label">Display</span>
      <div class="hdr-group-btns">
        <button class="hdr-btn" id="themeBtn" type="button">🌙 Dark</button>
      </div>
    </div>
    <a class="hdr-btn help-btn" href="help.html" target="_blank" rel="noopener" title="Help & resources">?</a>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- VIDEO COLUMN -->
    <div id="videoCol">
      <div id="videoWrapper">
        <video id="video" playsinline style="display:none"></video>
        <canvas id="overlay"></canvas>
        <div id="distBadge">--</div>
        <div id="camPlaceholder">
          <div class="cam-icon">📷</div>
          <div>Press Camera On<br>to begin</div>
        </div>
        <div id="countdownOverlay">
          <div id="countdownNum">3</div>
        </div>
      </div>

      <div id="controls">
        <button class="ctrl-btn cam-pending" id="startBtn">Camera On</button>
        <button class="ctrl-btn" id="clearBtn">✕ Clear</button>
      </div>

      <!-- TEMP: remove after size-history filter is validated -->
      <div id="logControls" style="display:flex; gap:6px;">
        <button class="ctrl-btn" id="logBtn" style="flex:1;">● Log: OFF</button>
        <button class="ctrl-btn" id="downloadLogBtn" style="flex:1;" disabled>⬇ CSV</button>
      </div>

    </div>

    <!-- CHART -->
    <div id="chartArea">
      <div id="chartWrap">
        <canvas id="chart"></canvas>
        <div id="distOverlay">
          <div id="distReadout">--</div>
          <div id="distUnit">feet</div>
        </div>
        <div id="slopeOverlay" class="hidden">
          <canvas id="arrowCanvas" width="90" height="90"></canvas>
          <div id="slopeReadout" class="zero">0.0</div>
          <div id="slopeDirLabel">—</div>
        </div>
      </div>
      <!-- No-setup overlay -->
      <div id="noSetupBanner" class="visible">
        <h2>Setup required</h2>
        <p>Choose your tracking method before starting — colored ball or ArUco marker.</p>
        <a href="setup.html?from=fulllab.html">Go to Setup →</a>
      </div>
    </div>

    <!-- DATA TABLE (toggleable, replaces the old fixed gauge column) -->
    <div id="tableCol" class="hidden">
      <div id="tableScroll">
        <table id="dataTable">
          <thead><tr><th>Time (s)</th><th id="tableValueHeader">Distance (ft)</th></tr></thead>
          <tbody id="dataTableBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /app -->

<script>
// ════════════════════════════════════════════════
// SESSION: read tracking choice from setup page
// ════════════════════════════════════════════════
const tracking = (() => {
  try { return JSON.parse(sessionStorage.getItem('mm_tracking')); } catch(e) { return null; }
})();

const noSetupBanner  = document.getElementById('noSetupBanner');

if (tracking) {
  noSetupBanner.classList.remove('visible');
}

// ════════════════════════════════════════════════
// ELEMENTS
// ════════════════════════════════════════════════
const video          = document.getElementById('video');
const overlay        = document.getElementById('overlay');
const ctx            = overlay.getContext('2d', { willReadFrequently: true });
const distBadge      = document.getElementById('distBadge');
const videoWrapper   = document.getElementById('videoWrapper');
const camPlaceholder = document.getElementById('camPlaceholder');
const statusDot      = document.getElementById('statusDot');
const startBtn       = document.getElementById('startBtn');
const clearBtn       = document.getElementById('clearBtn');
const distReadout    = document.getElementById('distReadout');
const arrowCanvas    = document.getElementById('arrowCanvas');
const arrowCtx       = arrowCanvas.getContext('2d');
const slopeReadout   = document.getElementById('slopeReadout');
const slopeDirLabel  = document.getElementById('slopeDirLabel');
const countdownOverlay = document.getElementById('countdownOverlay');
const countdownNum     = document.getElementById('countdownNum');
const logBtn           = document.getElementById('logBtn');
const downloadLogBtn   = document.getElementById('downloadLogBtn');
const unitsBtn          = document.getElementById('unitsBtn');
const unitsBtnValue      = unitsBtn.querySelector('b');
const graphModeBtn      = document.getElementById('graphModeBtn');
const graphModeBtnValue = graphModeBtn.querySelector('b');
const tableBtn          = document.getElementById('tableBtn');
const tableBtnValue     = tableBtn.querySelector('b');
const tableIntervalBtn      = document.getElementById('tableIntervalBtn');
const tableIntervalBtnValue = tableIntervalBtn.querySelector('b');
const slopeGaugeBtn      = document.getElementById('slopeGaugeBtn');
const slopeGaugeBtnValue = slopeGaugeBtn.querySelector('b');
const negTimeBtn      = document.getElementById('negTimeBtn');
const negTimeBtnValue = negTimeBtn.querySelector('b');
const gaugeBtn      = document.getElementById('gaugeBtn');
const gaugeBtnValue = gaugeBtn.querySelector('b');
const tableCol         = document.getElementById('tableCol');
const slopeOverlay     = document.getElementById('slopeOverlay');
const distOverlay      = document.getElementById('distOverlay');
const dataTableBody    = document.getElementById('dataTableBody');
const tableValueHeader = document.getElementById('tableValueHeader');
function updateTableHeader() {
  tableValueHeader.textContent = graphMode === 'speed'
    ? `Speed (${currentUnit}/s)` : `Distance (${currentUnit})`;
}

// State for the toggles above that used to be checkboxes — plain booleans
// now, driven by the stacked header buttons.
let tableOn = false;
let slopeGaugeOn = false;
let negTimeOn = false;
let gaugeOn = false;
distOverlay.style.display = 'none'; // gauge starts OFF — see gaugeBtn wiring further down

// ── SHARED SNAPPING: find the actual recorded sample closest to a target
// time. Used by both the per-second graph markers AND the table, so both
// land on the same tight alignment instead of drifting differently.
// Rounds to tenths, then drops the trailing ".0" for whole numbers — the
// data itself is far more precise than tenths; this is purely display.
// Used for TIME values only — always 1 decimal regardless of unit.
function formatSig(v) {
  const rounded = Math.round(v * 10) / 10;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
}

// Same idea, but for DISTANCE/SPEED values — 2 decimals in meters
// (matches centimeter precision), 1 decimal in feet.
function formatDist(v) {
  const places = currentUnit === 'm' ? 2 : 1;
  const factor = Math.pow(10, places);
  const rounded = Math.round(v * factor) / factor;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(places);
}

// Speed always shows hundredths regardless of unit (unlike distance, which
// stays at tenths for feet) — a derived rate benefits from the extra digit
// more than a directly-measured distance does.
function formatSpeed(v) {
  const rounded = Math.round(v * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2);
}

// Dispatches to whichever of the two the current graph mode calls for —
// used everywhere a plotted VALUE (not time) gets displayed.
function formatValue(v) {
  return graphMode === 'speed' ? formatSpeed(v) : formatDist(v);
}

// Always exactly 2 decimals, never drops a trailing zero — used for BOTH
// the time and the speed of an x-intercept point specifically, so "0.00"
// reads as a precise measurement rather than the ambiguous bare "0" that
// formatSpeed would otherwise give an exact zero.
function formatIntercept(v) {
  return v.toFixed(2);
}

// Interpolates the value AT an exact target time from the two real
// samples bracketing it — works even across a tracking gap, since it
// only needs one good sample before and one after. Returns the bracket
// width too, so callers can flag targets that fell inside an unusually
// long gap (interpolating across 2+ seconds of missing tracking is a much
// rougher estimate than across the normal ~0.05s sample spacing).
function interpolateAt(t) {
  if (!data.length) return null;
  if (t < data[0][0] || t > data[data.length-1][0]) return null;
  for (let i = 0; i < data.length - 1; i++) {
    if (data[i][0] <= t && data[i+1][0] >= t) {
      const gap = data[i+1][0] - data[i][0];
      const v = gap < 0.001 ? data[i][1]
        : data[i][1] + (data[i+1][1] - data[i][1]) * (t - data[i][0]) / gap;
      return { v, gap };
    }
  }
  return null;
}

// Derives a speed dataset from a distance dataset for the Graph Type
// switch. Samples distance at each "Every" interval mark (reusing
// interpolateAt, gap-safe, same technique the table already uses) rather
// than differencing raw consecutive samples, which would mostly just
// amplify tracking jitter into a much noisier "speed" than the actual
// motion. Each derived speed point is placed at the MIDPOINT of the
// interval it was computed over — the mathematically honest spot for an
// average rate, not at either endpoint.
function deriveSpeedFromDistance(distanceData, interval) {
  if (distanceData.length < 2) return [];
  const savedData = data;
  data = distanceData; // interpolateAt reads the global `data`
  const firstT = distanceData[0][0], lastT = distanceData[distanceData.length-1][0];
  const startTarget = Math.ceil(firstT / interval) * interval;
  const steps = Math.floor((lastT - startTarget) / interval + 0.0001);
  const marks = [];
  for (let i = 0; i <= steps; i++) {
    const target = startTarget + i * interval;
    const result = interpolateAt(target);
    if (result) marks.push({ t: target, v: result.v });
  }
  data = savedData;
  const speedPoints = [];
  for (let i = 1; i < marks.length; i++) {
    const dt = marks[i].t - marks[i-1].t;
    if (dt <= 0.0001) continue;
    const speed = (marks[i].v - marks[i-1].v) / dt;
    const tMid = (marks[i].t + marks[i-1].t) / 2;
    speedPoints.push([parseFloat(tMid.toFixed(3)), parseFloat(speed.toFixed(4))]);
  }
  return speedPoints;
}

// ── DATA TABLE: tenths-of-a-unit precision, thinned to a chosen interval
// (raw ~20Hz recording would make for an unreadably long table otherwise).
// Rows land EXACTLY on each clean multiple of tableInterval from t=0 (Go)
// — interpolated through any tracking gaps rather than snapping to
// whatever real sample happened to be nearby.
let tableInterval = 1; // seconds; default matches the "1s" button
function tableMinT() { return negTimeOn ? NEG_TIME_MIN : 0; }

function rebuildTable() {
  dataTableBody.innerHTML = '';
  if (!data.length) { return; }
  const minT = tableMinT();
  const firstT = data[0][0], lastT = data[data.length-1][0];
  const startTarget = Math.ceil(firstT / tableInterval) * tableInterval;
  const steps = Math.floor((lastT - startTarget) / tableInterval + 0.0001);
  for (let i = 0; i <= steps; i++) {
    const target = startTarget + i * tableInterval;
    if (target < minT - 0.0001) continue;
    const result = interpolateAt(target);
    if (!result) continue;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${formatSig(target)}</td><td>${formatValue(result.v)}</td>`;
    dataTableBody.appendChild(tr);
  }
  const scrollBox = dataTableBody.parentElement.parentElement;
  scrollBox.scrollTop = scrollBox.scrollHeight;
}

// ── DRAGGABLE OVERLAYS: distance gauge + slope gauge, both movable
// anywhere within the chart area. Locks in a left/top position on
// pointerdown (converting from right-anchored, for distOverlay) so drag
// works regardless of how the element was originally positioned in CSS.
function makeDraggable(el) {
  let dragging = false, offX = 0, offY = 0;
  el.addEventListener('pointerdown', (e) => {
    dragging = true;
    el.setPointerCapture(e.pointerId);
    const rect = el.getBoundingClientRect();
    const parentRect = el.parentElement.getBoundingClientRect();
    el.style.left = (rect.left - parentRect.left) + 'px';
    el.style.top  = (rect.top  - parentRect.top)  + 'px';
    el.style.right = 'auto';
    offX = e.clientX - rect.left;
    offY = e.clientY - rect.top;
    el.style.cursor = 'grabbing';
  });
  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const parentRect = el.parentElement.getBoundingClientRect();
    let x = e.clientX - parentRect.left - offX;
    let y = e.clientY - parentRect.top - offY;
    x = Math.max(0, Math.min(x, parentRect.width - el.offsetWidth));
    y = Math.max(0, Math.min(y, parentRect.height - el.offsetHeight));
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  });
  el.addEventListener('pointerup', () => { dragging = false; el.style.cursor = 'grab'; });
}
makeDraggable(slopeOverlay);
makeDraggable(distOverlay);


// ════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
// FULL LAB: Go-relative timing.
// Data collection starts the instant Start is pressed (t is very negative
// then). The visible/audible countdown is a display overlay layered on
// top, delayed by PRE_DELAY so it doesn't feel instantaneous. "Go" fires
// at PRE_DELAY + COUNTDOWN_LEN seconds after Start — that moment becomes
// t=0. Everything before it is negative time ("before we started"),
// which is what lets a graph show a real y-intercept instead of starting
// mid-motion. Recording hard-stops at GO_DELAY + MAX_DURATION after Start
// (i.e. exactly 10s after Go).
// ════════════════════════════════════════════════
const PRE_DELAY      = 0.5;              // silent buffer before countdown UI appears
const COUNTDOWN_LEN  = 3;                // visible 3-2-1 countdown
const GO_DELAY        = PRE_DELAY + COUNTDOWN_LEN; // 3.5s — Start press to "Go"
const INITIAL_WINDOW = 10;               // default graph window after Go
const MAX_DURATION    = 10;               // hard auto-stop, seconds after Go
const NEG_TIME_MIN    = -3;               // how far back the toggle reveals
const MARKER_SIZE = 14.0;  // cm — printable ArUco PDF
const BALL_DIAM   = tracking ? (tracking.ballDiam || 15.2) : 15.2; // cm
let   focalLength = 863;
// NOTE: distance is stored/plotted in whatever unit is currently selected
// (converted at record time, not display time) — toggling mid-session
// rescales the axis and retroactively converts already-plotted points.
// Slope/gauge thresholds (arrow sensitivity, "constant" cutoff) were tuned
// against ft/s and are NOT re-tuned for m/s — real m/s values will be
// smaller, so the arrow gauge will read "quieter" in meters. Flagging this
// as a known simplification, not a bug.
let currentUnit = Units.getPref().dist; // 'ft' | 'm'
let graphMode   = 'distance'; // 'distance' | 'speed'
// Snapshot of the distance dataset, taken right before a Distance→Speed
// switch derives a speed dataset from it. Lets Speed→Distance restore the
// exact original points instead of trying to integrate speed back into
// distance, which would compound tracking noise rather than undo it.
let cachedDistanceData = null;
// distance range is a fixed headroom guess; speed's max/min are now
// computed dynamically from the derived data itself (see applyAxisConfig)
// — this fallback only applies before anything's been recorded yet.
const Y_MAX = {
  distance: { ft: 10.5, m: 3.2 },  // labeled ceiling is 10ft/3m — this is
                                     // headroom so a point AT the ceiling
                                     // isn't jammed against the chart edge
  speed:    { ft: 8,   m: 2.5 }
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let recording       = false;
let countingDown    = false;
let data            = [];   // [[t, distFt], ...]
let startTime       = null;
let lastRecordTime  = -Infinity;
let smooth           = MotionTracker.createSmoother();
let calcSlope         = MotionTracker.createSlopeCalc();
let arrowAngleDeg   = 0;
let detector        = null;
let lastKnownPxW    = null;
let ballColor       = null;  // { r, g, b, h, s, v }
let ballPickMode    = false;
let countdownTimer  = null;
let preDelayTimer   = null;
// TEMP: logging state — remove after size-history filter is validated
let logging         = false;
let logRows         = [];
let logStartTime    = null;
let mediaStreamTrack = null;

const ballModeOn = tracking && tracking.topMode === 'ball';
const arucoMode  = !ballModeOn;

// ════════════════════════════════════════════════
// CHART — bold, minimal, high-contrast
// ════════════════════════════════════════════════

// Plugin: draw coordinate labels at each whole second + y-intercept
// (Full Lab removes the fixed-duration marker plugin from Quick Start —
// recording length is open-ended here, so there's no fixed endpoint to mark.)

// Plugin: vertical "Start" line at t=0 — only meaningful (and only drawn)
// when the x-axis extends below 0, i.e. the negative-time toggle is on.
// Shared theme-aware text/line color for canvas-drawn plugins below —
// Chart.js options read CSS at creation time only, so anything drawn
// directly on the canvas needs its own live reference, updated by
// applyTheme() further down.
let chartTextColor = '#ffffff';

const startLinePlugin = {
  id: 'startLine',
  afterDraw(ch) {
    const xScale = ch.scales.x, yScale = ch.scales.y;
    if (!xScale || !yScale || xScale.min >= 0) return;
    const xPx = xScale.getPixelForValue(0);
    if (xPx < xScale.left || xPx > xScale.right) return;
    const c2 = ch.ctx;
    c2.save();
    c2.strokeStyle = chartTextColor === '#ffffff' ? 'rgba(255,255,255,0.55)' : 'rgba(26,29,39,0.55)';
    c2.lineWidth = 2;
    c2.beginPath();
    c2.moveTo(xPx, yScale.top);
    c2.lineTo(xPx, yScale.bottom);
    c2.stroke();
    c2.fillStyle = chartTextColor;
    c2.font = 'bold 11px "Space Mono", monospace';
    c2.textAlign = 'center';
    c2.fillText('Start', xPx, yScale.top - 5);
    c2.restore();
  }
};

// Plugin: hover preview (soft yellow, follows the nearest half-second as
// you move the mouse) + pinned points (solid pink, click to lock/unlock).
// Ported from Quick Start so both pages give students the same "we're only
// looking at 0.5s intervals" reading experience. See mousemove/click
// listeners below the chart definition for how these get populated.
let hoverPreview = null;   // { t, v } | null
let pinnedPoints = [];     // [{ t, v }, ...]

// Draws a coordinate dot + floating label. fontSize is bumped for the
// live hover point so it visibly "pops" compared to pinned points.
// Sets its own textAlign — must not depend on caller state, since
// drawAxisChip (called right before this for the hover point) leaves
// textAlign set to whatever its own last call used.
function drawCoordDot(c2, xPx, yPx, label, { fill, stroke, alpha }, fontSize = 11) {
  c2.beginPath();
  c2.arc(xPx, yPx, 6, 0, Math.PI * 2);
  c2.globalAlpha = alpha;
  c2.fillStyle = fill;
  c2.fill();
  c2.strokeStyle = stroke;
  c2.lineWidth = 2;
  c2.stroke();
  c2.font = `bold ${fontSize}px "Space Mono", monospace`;
  c2.textAlign = 'center';
  const labelY = yPx - 14;
  c2.fillStyle = 'rgba(15,17,23,0.9)';
  const w = c2.measureText(label).width;
  c2.fillRect(xPx - w/2 - 4, labelY - fontSize - 1, w + 8, fontSize + 5);
  c2.fillStyle = '#ffffff';
  c2.fillText(label, xPx, labelY);
  c2.globalAlpha = 1;
}

// Small filled chip for the axis-edge value callouts drawn under the
// hovered point — sits on top of the normal tick labels, same convention
// most graphing tools use for a live-hover readout.
function drawAxisChip(c2, x, y, text, align) {
  c2.textAlign = align;
  const w = c2.measureText(text).width;
  const boxX = align === 'center' ? x - w/2 - 4 : (align === 'right' ? x - w - 8 : x);
  c2.fillStyle = 'rgba(15,17,23,0.92)';
  c2.fillRect(boxX, y - 9, w + 8, 15);
  c2.fillStyle = '#ffd740';
  c2.fillText(text, align === 'center' ? x : (align === 'right' ? x - 4 : x + 4), y + 2);
}

const coordLabelPlugin = {
  id: 'coordLabels',
  afterDraw(ch) {
    if (!pinnedPoints.length && !hoverPreview) return;
    const xScale = ch.scales.x;
    const yScale = ch.scales.y;
    const c2     = ch.ctx;
    c2.save();
    c2.textAlign = 'center';

    // Pinned points draw first so the (larger, later-drawn) live hover
    // point always renders on top when the two overlap.
    pinnedPoints.forEach((pt) => {
      const xPx = xScale.getPixelForValue(pt.t);
      const yPx = yScale.getPixelForValue(pt.v);
      if (xPx < xScale.left || xPx > xScale.right) return;
      const tLabel = pt.isIntercept ? formatIntercept(pt.t) : formatSig(pt.t);
      const vLabel = pt.isIntercept ? formatIntercept(pt.v) : formatValue(pt.v);
      drawCoordDot(c2, xPx, yPx, `(${tLabel}, ${vLabel})`,
        { fill: '#ff4081', stroke: '#ffffff', alpha: 1 });
    });

    // Live hover: dashed guide lines down to the x-axis and across to the
    // y-axis, with the exact value called out at each axis, plus a bigger
    // coordinate dot/label than a pinned point gets. All of this clears
    // the instant the mouse leaves the chart (hoverPreview goes null).
    if (hoverPreview) {
      const xPx = xScale.getPixelForValue(hoverPreview.t);
      const yPx = yScale.getPixelForValue(hoverPreview.v);
      if (xPx >= xScale.left && xPx <= xScale.right && yPx >= yScale.top && yPx <= yScale.bottom) {
        c2.save();
        c2.strokeStyle = 'rgba(255,215,64,0.6)';
        c2.lineWidth = 1.5;
        c2.setLineDash([4, 4]);
        c2.beginPath();
        c2.moveTo(xPx, yPx); c2.lineTo(xPx, yScale.bottom);
        c2.moveTo(xPx, yPx); c2.lineTo(xScale.left, yPx);
        c2.stroke();
        c2.setLineDash([]);
        c2.restore();

        const tLabel = hoverPreview.isIntercept ? formatIntercept(hoverPreview.t) : formatSig(hoverPreview.t);
        const vLabel = hoverPreview.isIntercept ? formatIntercept(hoverPreview.v) : formatValue(hoverPreview.v);
        c2.font = 'bold 14px "Space Mono", monospace';
        drawAxisChip(c2, xPx, yScale.bottom + 18, tLabel, 'center');
        drawAxisChip(c2, xScale.left - 6, yPx, vLabel, 'right');

        drawCoordDot(c2, xPx, yPx, `(${tLabel}, ${vLabel})`,
          { fill: '#ffd740', stroke: '#ffffff', alpha: 0.7 }, 19);
      }
    }

    c2.restore();
  }
};

// Small "x"/"y" labels right at the axis ends, like a textbook coordinate
// plane — separate from the more descriptive "Time (s)"/"Speed (ft/s)"
// titles Chart.js already draws. Positioned off the actual zero-lines
// (via getPixelForValue(0)) rather than hardcoded to a corner — in speed
// mode the "x-axis" (y=0) can sit mid-chart rather than at the bottom
// edge, and with -3s shown the "y-axis" (t=0) isn't always at the left
// edge either, so this has to follow the real zero-lines, not a corner.
const axisLabelsPlugin = {
  id: 'axisEndLabels',
  afterDraw(ch) {
    const xScale = ch.scales.x, yScale = ch.scales.y;
    const c2 = ch.ctx;
    c2.save();
    c2.font = 'bold 13px "Space Mono", monospace';
    c2.fillStyle = chartTextColor;
    const zeroYPx = yScale.getPixelForValue(0);
    if (zeroYPx >= yScale.top && zeroYPx <= yScale.bottom) {
      c2.textAlign = 'right';
      c2.fillText('x', xScale.right - 4, zeroYPx - 6);
    }
    const zeroXPx = xScale.getPixelForValue(0);
    if (zeroXPx >= xScale.left && zeroXPx <= xScale.right) {
      c2.textAlign = 'left';
      c2.fillText('y', zeroXPx + 6, yScale.top + 14);
    }
    c2.restore();
  }
};

// Finds every x-intercept (speed = 0) in the current speed data by linear
// interpolation between consecutive samples that straddle zero — same
// technique as deriveSpeedFromDistance, just solving for t at v=0 instead
// of v at a given t. Used both to draw always-visible markers (so
// intercepts are visually "findable" without hunting) and to give the
// hover/click snap a magnetic pull toward them (see snappedPreviewAt).
function findZeroCrossings() {
  if (graphMode !== 'speed' || data.length < 2) return [];
  const crossings = [];
  for (let i = 0; i < data.length - 1; i++) {
    const [t0, v0] = data[i], [t1, v1] = data[i+1];
    if (v0 === 0) crossings.push(t0);
    else if ((v0 < 0) !== (v1 < 0)) {
      crossings.push(t0 + (0 - v0) * (t1 - t0) / (v1 - v0));
    }
  }
  return crossings;
}

// Builds the actual plotted {x,y} points for the chart, inserting a real
// (t, 0) point at every crossing found above. This is what makes the two
// speed-graph fixes work: with a genuine zero point sitting between any
// positive/negative pair, no rendered segment ever straddles zero anymore
// — so per-segment red/blue coloring (which colors a segment red if
// EITHER endpoint is negative) becomes correct instead of bleeding red
// into the still-positive half of a straddling segment. Combined with
// tension:0 in speed mode (see motionDataset), the line is now dead
// straight between real points, so it passes through the same crossing
// the marker ring is drawn at — no more "slightly off" mismatch between
// a curved line and a linearly-computed crossing.
function chartPointsWithZeroCrossings(distSpeedData) {
  const points = [];
  for (let i = 0; i < distSpeedData.length; i++) {
    const [t, v] = distSpeedData[i];
    points.push({ x: t, y: v });
    if (i < distSpeedData.length - 1) {
      const [t1, v1] = distSpeedData[i+1];
      if (v !== 0 && v1 !== 0 && (v < 0) !== (v1 < 0)) {
        const tc = t + (0 - v) * (t1 - t) / (v1 - v);
        points.push({ x: tc, y: 0 });
      }
    }
  }
  return points;
}

// Always-visible (not hover-only) small ring at each x-intercept — plain
// pinned/hover dots only appear on interaction, but "finding x-intercepts"
// is the point of this graph, so these get a permanent, subtle marker.
const interceptMarkersPlugin = {
  id: 'interceptMarkers',
  afterDraw(ch) {
    const crossings = findZeroCrossings();
    if (!crossings.length) return;
    const xScale = ch.scales.x, yScale = ch.scales.y;
    const zeroYPx = yScale.getPixelForValue(0);
    const c2 = ch.ctx;
    c2.save();
    c2.strokeStyle = 'rgba(255,255,255,0.75)';
    c2.lineWidth = 1.5;
    crossings.forEach(t => {
      const xPx = xScale.getPixelForValue(t);
      if (xPx < xScale.left || xPx > xScale.right) return;
      c2.beginPath();
      c2.arc(xPx, zeroYPx, 5, 0, Math.PI * 2);
      c2.stroke();
    });
    c2.restore();
  }
};

Chart.register(startLinePlugin, coordLabelPlugin, axisLabelsPlugin, interceptMarkersPlugin);

function motionDataset() {
  return {
    label: 'Motion', data: [],
    borderColor: '#00e5ff', backgroundColor: 'rgba(0,229,255,0.08)',
    borderWidth: 3, pointRadius: 0, pointHoverRadius: 0, fill: true,
    // Straight segments in speed mode — a curved spline wouldn't actually
    // pass through the real zero-crossing points inserted below, which
    // would put the line and the intercept markers visibly out of sync.
    tension: graphMode === 'speed' ? 0 : 0.3,
    // Explicit blue/red only in speed mode — distance is never negative,
    // but without this check it would ALSO turn Distance's line blue
    // instead of leaving it at the app's normal cyan.
    segment: {
      borderColor: ctx => graphMode !== 'speed' ? undefined
        : (ctx.p0.parsed.y < 0 || ctx.p1.parsed.y < 0) ? '#ff5252' : '#448aff',
      backgroundColor: ctx => graphMode !== 'speed' ? undefined
        : (ctx.p0.parsed.y < 0 || ctx.p1.parsed.y < 0) ? 'rgba(255,82,82,0.08)' : 'rgba(68,138,255,0.08)'
    }
  };
}

const chart = new Chart(document.getElementById('chart'), {

        ticks: {

        },

            : Number.isInteger(c.tick.value) ? 'rgba(160,180,255,0.45)' : 'rgba(160,180,255,0.15)',
          lineWidth: c => c.tick.value === 0 ? 2.5 : Number.isInteger(c.tick.value) ? 2 : 0.8
        }
      }

// ── HOVER + CLICK-TO-PIN: same behavior as Quick Start — cursor snaps to
// the nearest half-second grid mark, showing a live soft-yellow preview via
// interpolateAt(); clicking pins it solid pink, clicking a pinned point
// again removes it. interpolateAt() here returns { v, gap } (not a bare
// number, unlike Quick Start's version) so this pulls .v out of it.
const HALF_STEP = 0.5;
function snappedPreviewAt(clientX) {
  const rect = chart.canvas.getBoundingClientRect();
  const rawT = chart.scales.x.getValueForPixel(clientX - rect.left);

  // Magnetic pull toward a true x-intercept when the cursor is close to
  // one — finding these is the point of a speed graph, so they get
  // precise snapping in addition to the regular interval grid.
  if (graphMode === 'speed') {
    for (const tc of findZeroCrossings()) {
      if (Math.abs(tc - rawT) < HALF_STEP / 2) {
        return { t: parseFloat(tc.toFixed(3)), v: 0, isIntercept: true };
      }
    }
  }

  const snappedT = Math.round(rawT / HALF_STEP) * HALF_STEP;
  const result = interpolateAt(snappedT);
  return result === null ? null : { t: snappedT, v: result.v };
}

chart.canvas.addEventListener('mousemove', (e) => {
  hoverPreview = snappedPreviewAt(e.clientX);
  chart.update('none');
});
chart.canvas.addEventListener('mouseleave', () => {
  hoverPreview = null;
  chart.update('none');
});
chart.canvas.addEventListener('click', (e) => {
  const pt = snappedPreviewAt(e.clientX);
  if (!pt) return;
  const existingIdx = pinnedPoints.findIndex(p => Math.abs(p.t - pt.t) < HALF_STEP/2);
  if (existingIdx >= 0) {
    pinnedPoints.splice(existingIdx, 1); // click again to unpin
  } else {
    pinnedPoints.push(pt);
  }
  chart.update('none');
});

// ── THEME: dark/light, session-persisted (same pattern as mm_tracking,
// mm_units). CSS variables handle the page chrome automatically; the
// chart's axis text/lines are set directly in JS (Chart.js doesn't read
// CSS variables), so chartTextColor is reapplied here whenever it changes.
const THEME_KEY = 'mm_theme';
const themeBtn = document.getElementById('themeBtn');
function getTheme() {
  try { return sessionStorage.getItem(THEME_KEY) || 'dark'; } catch(e) { return 'dark'; }
}
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  try { sessionStorage.setItem(THEME_KEY, theme); } catch(e) {}
  themeBtn.textContent = theme === 'light' ? '☀ Light' : '🌙 Dark';
  chartTextColor = theme === 'light' ? '#1a1d27' : '#ffffff';
  chart.options.scales.x.title.color = chartTextColor;
  chart.options.scales.x.ticks.color = chartTextColor;
  chart.options.scales.y.title.color = chartTextColor;
  chart.options.scales.y.ticks.color = chartTextColor;
  chart.update();
}
themeBtn.onclick = () => applyTheme(getTheme() === 'light' ? 'dark' : 'light');
applyTheme(getTheme());

// ════════════════════════════════════════════════
// SLOPE ARROW GAUGE (same as full lab)
// ════════════════════════════════════════════════
function slopeToColor(slope) {
  const abs = Math.abs(slope);
  const norm = Math.min(abs / 4, 1);
  const alpha = 0.08 + norm * 0.77;
  if (abs < 0.05) return { solid: `rgba(255,215,64,${alpha})`, pure: '#ffd740', name: 'zero' };
  if (slope > 0)  return { solid: `rgba(105,240,174,${alpha})`, pure: '#69f0ae', name: 'pos' };
  return              { solid: `rgba(255,64,129,${alpha})`,  pure: '#ff4081', name: 'neg' };
}

function drawArrow(angleDeg, slope) {
  const w = arrowCanvas.width, h = arrowCanvas.height;
  const cx = w/2, cy = h/2, r = Math.min(w,h)*0.42;
  arrowCtx.clearRect(0, 0, w, h);
  const col = slopeToColor(slope);

  arrowCtx.beginPath();
  arrowCtx.arc(cx, cy, r+6, 0, Math.PI*2);
  arrowCtx.fillStyle = col.solid; arrowCtx.fill();
  arrowCtx.strokeStyle = col.pure+'88'; arrowCtx.lineWidth = 2; arrowCtx.stroke();

  [-90,-67.5,-45,-22.5,0,22.5,45,67.5,90].forEach(deg => {
    const rad = deg*Math.PI/180, isMajor = deg%45===0;
    const inner = r-(isMajor?7:4), outer = r+1;
    arrowCtx.beginPath();
    arrowCtx.moveTo(cx+Math.cos(rad)*inner, cy+Math.sin(rad)*inner);
    arrowCtx.lineTo(cx+Math.cos(rad)*outer, cy+Math.sin(rad)*outer);
    arrowCtx.strokeStyle = isMajor?'#4a5280':'#2e3356';
    arrowCtx.lineWidth = isMajor?2:1; arrowCtx.stroke();
  });

  const rad   = angleDeg*Math.PI/180;
  const tipX  = cx+Math.cos(rad)*(r-8), tipY  = cy+Math.sin(rad)*(r-8);
  const tailX = cx-Math.cos(rad)*(r-18), tailY = cy-Math.sin(rad)*(r-18);
  arrowCtx.beginPath(); arrowCtx.moveTo(tailX,tailY); arrowCtx.lineTo(tipX,tipY);
  arrowCtx.strokeStyle = col.pure; arrowCtx.lineWidth = 5; arrowCtx.lineCap='round'; arrowCtx.stroke();
  const hl=14, ha=0.42;
  arrowCtx.beginPath();
  arrowCtx.moveTo(tipX,tipY);
  arrowCtx.lineTo(tipX-hl*Math.cos(rad-ha), tipY-hl*Math.sin(rad-ha));
  arrowCtx.moveTo(tipX,tipY);
  arrowCtx.lineTo(tipX-hl*Math.cos(rad+ha), tipY-hl*Math.sin(rad+ha));
  arrowCtx.strokeStyle=col.pure; arrowCtx.lineWidth=4; arrowCtx.stroke();
  arrowCtx.beginPath(); arrowCtx.arc(cx,cy,5,0,Math.PI*2);
  arrowCtx.fillStyle=col.pure; arrowCtx.fill();
}
drawArrow(0, 0);

function updateGauges(distFt, slope) {
  distReadout.textContent = distFt.toFixed(currentUnit === 'm' ? 2 : 1);
  const clamped = Math.max(-4, Math.min(4, slope));
  const target  = -clamped * 20;
  arrowAngleDeg += (target - arrowAngleDeg) * 0.22;
  drawArrow(arrowAngleDeg, slope);
  const sign = slope >= 0 ? '+' : '';
  slopeReadout.textContent = sign + slope.toFixed(1);
  const col = slopeToColor(slope);
  slopeReadout.className = col.name;
  slopeDirLabel.textContent = Math.abs(slope) < 0.05 ? 'constant' : slope > 0 ? 'moving away' : 'moving closer';
  videoWrapper.classList.remove('slope-pos','slope-neg','slope-zero');
  videoWrapper.classList.add('slope-' + col.name);
}

// ════════════════════════════════════════════════
// COLOR HELPERS: MotionTracker.rgbToHsv (shared module)
// ════════════════════════════════════════════════

// ════════════════════════════════════════════════
// PROCESS VIDEO
// ════════════════════════════════════════════════
function processVideo() {
  if (!video.videoWidth) { requestAnimationFrame(processVideo); return; }
  // Auto-stop must not depend on tracking succeeding this frame — the
  // duration check inside recordPoint() only ran when found/detected was
  // true, so a tracking dropout right around t=10 (motion ending, ball
  // settling, common right when the clip should end) could skip it
  // indefinitely. Checked here, every frame, unconditionally.
  if (recording) {
    const t = (Date.now()-startTime)/1000 - GO_DELAY;
    if (t >= MAX_DURATION) { stopRecording(); requestAnimationFrame(processVideo); return; }
  }
  const vw=video.videoWidth, vh=video.videoHeight;
  const dw=videoWrapper.clientWidth, dh=videoWrapper.clientHeight;
  const vAsp=vw/vh, dAsp=dw/dh;
  let cropX=0,cropY=0,cropW=vw,cropH=vh;
  if (vAsp>dAsp) { cropH=vh; cropW=Math.round(vh*dAsp); cropX=Math.round((vw-cropW)/2); }
  else           { cropW=vw; cropH=Math.round(vw/dAsp); cropY=Math.round((vh-cropH)/2); }

  const off=document.createElement('canvas'); off.width=vw; off.height=vh;
  const offCtx=off.getContext('2d',{willReadFrequently:true});
  offCtx.drawImage(video,0,0,vw,vh);
  overlay.width=dw; overlay.height=dh;
  ctx.clearRect(0,0,dw,dh);

  function toDisplay(nx,ny) {
    return { x:((nx-cropX)/cropW)*dw, y:((ny-cropY)/cropH)*dh };
  }

  if (ballModeOn && ballColor) {
    const imageData=offCtx.getImageData(0,0,vw,vh), pixels=imageData.data;
    // Detection lives in motionTracker.js — original, validated formula
    // (no adaptive widen; see MotionTracker header comment for why).
    const result = MotionTracker.detectBall(pixels, vw, vh, ballColor);
    const { found, cx: cxN, cy: cyN, r, fitScore, density, clusterCount } = result;

    // ── TEMP: BASELINE LOGGING — remove once ball tracking work resumes ──
    if (logging) {
      let fbSum=0, fbN=0;
      for (let py=0; py<vh; py+=20) {
        for (let px=0; px<vw; px+=20) {
          const idx=(py*vw+px)*4;
          fbSum += MotionTracker.rgbToHsv(pixels[idx],pixels[idx+1],pixels[idx+2]).v;
          fbN++;
        }
      }
      // Ball-region brightness: sample within the fitted circle directly
      // (module doesn't expose the raw point cluster, so sample the
      // detected region itself instead — semantically equivalent).
      let bbSum=0, bbN=0;
      if (found) {
        const SBOX=6;
        for (let py=Math.max(0,cyN-r); py<Math.min(vh,cyN+r); py+=SBOX) {
          for (let px=Math.max(0,cxN-r); px<Math.min(vw,cxN+r); px+=SBOX) {
            if ((px-cxN)**2+(py-cyN)**2 > r*r) continue;
            const idx=(Math.round(py)*vw+Math.round(px))*4;
            bbSum += MotionTracker.rgbToHsv(pixels[idx],pixels[idx+1],pixels[idx+2]).v;
            bbN++;
          }
        }
      }
      let camSettings = {};
      try { camSettings = mediaStreamTrack ? mediaStreamTrack.getSettings() : {}; } catch(e) {}
      logRows.push({
        t: ((Date.now()-logStartTime)/1000).toFixed(2),
        found: found ? 1 : 0,
        radius_px: r ? r.toFixed(1) : '',
        cluster_count: clusterCount,
        density: density.toFixed(3),
        fit_score: fitScore !== null ? fitScore.toFixed(3) : '',
        distance_ft: '',
        frame_brightness_v: fbN ? (fbSum/fbN).toFixed(3) : '',
        ball_brightness_v: bbN ? (bbSum/bbN).toFixed(3) : '',
        exposure_time: camSettings.exposureTime ?? '',
        focus_distance: camSettings.focusDistance ?? ''
      });
      downloadLogBtn.disabled = false;
    }

    if(found){
      const diamPx=r*2;
      lastKnownPxW=diamPx;
      const distCm=smooth((BALL_DIAM*focalLength)/diamPx);
      const distFt=distCm/30.48;
      const distDisplay = currentUnit==='m' ? Units.ftToM(distFt) : distFt;
      const dispC=toDisplay(cxN,cyN);
      const dispR=Math.max(8,(diamPx/cropW)*dw/2);
      ctx.strokeStyle='#ffd740'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(dispC.x,dispC.y,dispR,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='rgba(255,215,64,0.12)'; ctx.fill();
      ctx.beginPath(); ctx.arc(dispC.x,dispC.y,5,0,Math.PI*2);
      ctx.fillStyle='#ffd740'; ctx.fill();
      distBadge.innerText=distDisplay.toFixed(currentUnit === 'm' ? 2 : 1)+' '+currentUnit;
      const now=(Date.now()-startTime)/1000;
      const slope = calcSlope(now,distDisplay);
      updateGauges(distDisplay, slope);
      if(recording) recordPoint(graphMode === 'speed' ? slope : distDisplay);
      if (logging && logRows.length) logRows[logRows.length-1].distance_ft = distFt.toFixed(3);
    } else {
      distBadge.innerText='No ball found';
      videoWrapper.classList.remove('slope-pos','slope-neg','slope-zero');
    }
    requestAnimationFrame(processVideo); return;
  }

  if (ballModeOn && !ballColor) {
    // Ball mode but color not yet picked — show pick prompt
    distBadge.innerText='Tap ball to pick color';
    requestAnimationFrame(processVideo); return;
  }

  // ── ARUCO MODE ──
  const imageData=offCtx.getImageData(0,0,vw,vh);
  const markers=detector.detect(imageData);
  if(markers.length>0){
    const corners=markers[0].corners;
    const dc=corners.map(c=>toDisplay(c.x,c.y));
    ctx.strokeStyle='#00e5ff'; ctx.lineWidth=3;
    ctx.beginPath(); dc.forEach((c,i)=>i===0?ctx.moveTo(c.x,c.y):ctx.lineTo(c.x,c.y));
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle='#ff4081';
    dc.forEach(c=>{ctx.beginPath();ctx.arc(c.x,c.y,6,0,Math.PI*2);ctx.fill();});
    const widthPx=Math.hypot(corners[0].x-corners[1].x,corners[0].y-corners[1].y);
    lastKnownPxW=widthPx;
    const distCm=smooth((MARKER_SIZE*focalLength)/widthPx);
    const distFt=distCm/30.48;
    const distDisplay = currentUnit==='m' ? Units.ftToM(distFt) : distFt;
    distBadge.innerText=distDisplay.toFixed(currentUnit === 'm' ? 2 : 1)+' '+currentUnit;
    const now=(Date.now()-startTime)/1000;
    const slope = calcSlope(now,distDisplay);
    updateGauges(distDisplay, slope);
    if(recording) recordPoint(graphMode === 'speed' ? slope : distDisplay);
  } else {
    distBadge.innerText='No marker detected';
    videoWrapper.classList.remove('slope-pos','slope-neg','slope-zero');
  }
  requestAnimationFrame(processVideo);
}

function recordPoint(value) {
  const t=(Date.now()-startTime)/1000 - GO_DELAY; // negative until "Go" fires
  if(t>=MAX_DURATION){ stopRecording(); return; }
  if(t-lastRecordTime>=0.05){
    lastRecordTime=t;
    const tv=parseFloat(t.toFixed(2)), dv=parseFloat(value.toFixed(3));
    data.push([tv,dv]);
    chart.data.datasets[0].data.push({x:tv,y:dv});
    chart.update('none');
    if (tableOn) rebuildTable();
  }
}

// ════════════════════════════════════════════════
// BALL COLOR PICK (tap on video)
// ════════════════════════════════════════════════
overlay.addEventListener('click', (e) => {
  if (!ballModeOn || !video.videoWidth) return;
  const rect=videoWrapper.getBoundingClientRect();
  const cx=(e.clientX-rect.left)/rect.width;
  const cy=(e.clientY-rect.top)/rect.height;
  const vw=video.videoWidth, vh=video.videoHeight;
  const dw=videoWrapper.clientWidth, dh=videoWrapper.clientHeight;
  const vAsp=vw/vh, dAsp=dw/dh;
  let cropX=0,cropY=0,cropW=vw,cropH=vh;
  if(vAsp>dAsp){cropH=vh;cropW=Math.round(vh*dAsp);cropX=Math.round((vw-cropW)/2);}
  else{cropW=vw;cropH=Math.round(vw/dAsp);cropY=Math.round((vh-cropH)/2);}
  const nx=Math.round(cropX+cx*cropW), ny=Math.round(cropY+cy*cropH);
  const tmp=document.createElement('canvas'); tmp.width=vw; tmp.height=vh;
  const tCtx=tmp.getContext('2d',{willReadFrequently:true}); tCtx.drawImage(video,0,0,vw,vh);

  ballColor = MotionTracker.pickBallColor(tCtx, nx, ny, vw, vh);
  distBadge.innerText = `Picked H:${Math.round(ballColor.h)}° · range from ${ballColor.keptCount} samples`;
});

// ════════════════════════════════════════════════
// RECORDING
// ════════════════════════════════════════════════
function playChime(isGo){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ac.createOscillator(),gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.frequency.value=isGo?880:440;osc.type='sine';
    gain.gain.setValueAtTime(0.4,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(isGo?0.6:0.25));
    osc.start(ac.currentTime);osc.stop(ac.currentTime+(isGo?0.6:0.25));
  }catch(e){}
}

// First click: request camera permission, turn on the live preview.
// Once the camera's on, the SAME button becomes Start/Stop for recording —
// its own label/color switch is the only feedback needed.
let cameraOn = false;
startBtn.onclick = () => {
  if (!cameraOn) {
    if(arucoMode){
      if(typeof AR==='undefined'){alert('ArUco library failed to load. Refresh.');return;}
      if(!detector) detector=new AR.Detector();
    }
    startBtn.disabled=true;
    navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720}}})
      .then(stream=>{
        video.srcObject=stream; video.style.display='block';
        camPlaceholder.style.display='none';
        mediaStreamTrack = stream.getVideoTracks()[0];
        video.onloadedmetadata=()=>{
          video.play();
          statusDot.classList.add('active');
          startTime=Date.now();
          requestAnimationFrame(processVideo);
        };
        cameraOn = true;
        startBtn.disabled=false;
        startBtn.classList.remove('cam-pending');
        startBtn.textContent='▶ Start';
      })
      .catch(err=>{ alert('Camera access denied: '+err.message); startBtn.disabled=false; });
    return;
  }
  if(recording){ stopRecording(); return; }
  beginRecording(); // data collection starts NOW — t is negative until "Go"
  countingDown = true;
  preDelayTimer = setTimeout(() => {
    let remaining = COUNTDOWN_LEN;
    countdownOverlay.classList.add('visible');
    countdownNum.classList.remove('go');
    countdownNum.textContent = remaining;
    playChime(false);
    countdownTimer = setInterval(() => {
      remaining--;
      if (remaining > 0) {
        countdownNum.classList.remove('go');
        countdownNum.textContent = remaining;
        playChime(false);
      } else {
        countdownNum.classList.add('go');
        countdownNum.textContent = 'GO!';
        playChime(true);
        clearInterval(countdownTimer);
        setTimeout(() => {
          countdownOverlay.classList.remove('visible');
          countdownNum.classList.remove('go');
          countingDown = false;
        }, 800);
      }
    }, 1000);
  }, PRE_DELAY * 1000);
};

function beginRecording(){
  data=[]; recording=true; cachedDistanceData=null; // stale cache from a prior mode switch must not survive into a fresh take
  startTime=Date.now(); lastRecordTime=-Infinity; // startTime = button press (T0); recordPoint subtracts GO_DELAY
  smooth=MotionTracker.createSmoother(); calcSlope=MotionTracker.createSlopeCalc();
  dataTableBody.innerHTML='';
  statusDot.classList.remove('active');
  statusDot.classList.add('recording');
  startBtn.textContent = '■ Stop';
  chart.options.scales.x.max = INITIAL_WINDOW; // reset growth from any prior take
  chart.options.scales.x.min = negTimeOn ? NEG_TIME_MIN : 0;
  // Ghost previous run (faint)
  const prev=chart.data.datasets[0];
  const ghost = (prev&&prev.data&&prev.data.length>0) ? {
    label:'Prev',data:prev.data.slice(),
    borderColor:'rgba(0,229,255,0.15)',backgroundColor:'transparent',
    borderWidth:1,pointRadius:0,fill:false,tension:0.3
  } : null;
  chart.data.datasets = ghost ? [motionDataset(), ghost] : [motionDataset()];
  chart.update();
}

function stopRecording(){
  recording=false;
  countingDown=false;
  clearTimeout(preDelayTimer);
  clearInterval(countdownTimer);
  countdownOverlay.classList.remove('visible');
  countdownNum.classList.remove('go');
  statusDot.classList.remove('recording');
  statusDot.classList.add('active');
  startBtn.textContent = '▶ Start';
  // Live recording pushes raw points only (no zero-crossing insertion, to
  // keep the per-frame push simple) — redraw with real crossing points
  // now that recording's done, so a speed recording made directly (not
  // via the distance→speed derive path) still gets accurate segment
  // coloring and intercept markers for analysis.
  if (graphMode === 'speed' && data.length >= 2) {
    chart.data.datasets[0].data = chartPointsWithZeroCrossings(data);
  }
  chart.update();
}

// ════════════════════════════════════════════════
// TEMP: BASELINE LOGGING — remove after filter validated
// ════════════════════════════════════════════════
logBtn.onclick = () => {
  logging = !logging;
  if (logging) {
    logRows = [];
    logStartTime = Date.now();
    logBtn.textContent = '● Log: ON';
    logBtn.style.color = '#ff4081';
    logBtn.style.borderColor = 'rgba(255,64,129,0.5)';
    downloadLogBtn.disabled = true;
  } else {
    logBtn.textContent = '● Log: OFF';
    logBtn.style.color = '';
    logBtn.style.borderColor = '';
  }
};

downloadLogBtn.onclick = () => {
  if (!logRows.length) return;
  const headers = ['t','found','radius_px','cluster_count','density','fit_score','distance_ft','frame_brightness_v','ball_brightness_v','exposure_time','focus_distance'];
  const lines = [headers.join(',')];
  for (const row of logRows) {
    lines.push(headers.map(h => (row[h] !== undefined && row[h] !== null) ? row[h] : '').join(','));
  }
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ball-tracking-log-${Date.now()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};

// ════════════════════════════════════════════════
// UNITS + GRAPH MODE
// ════════════════════════════════════════════════
function convertDist(val, fromU, toU) {
  if (fromU === toU) return val;
  const ft = fromU === 'm' ? Units.mToFt(val) : val;
  return toU === 'm' ? Units.ftToM(ft) : ft;
}

function applyAxisConfig() {
  if (graphMode === 'speed' && data.length) {
    // Scale to the actual derived data rather than a fixed guess — a
    // thrown object (once that's tracked) could easily exceed a fixed
    // ±3 range, and a gentle walk would be dwarfed by one that's too wide.
    const speeds = data.map(([,v]) => v);
    const dataMax = Math.max(...speeds), dataMin = Math.min(...speeds);
    const span = Math.max(dataMax - dataMin, 0.5); // avoid a degenerate near-zero range
    const pad = span * 0.15;
    chart.options.scales.y.max = Math.max(dataMax + pad, 0.1);
    chart.options.scales.y.min = Math.min(dataMin - pad, -0.1); // keep zero visible — crossing it is the moment that matters most
  } else if (graphMode === 'speed') {
    chart.options.scales.y.max = Y_MAX.speed[currentUnit]; // nothing recorded yet — fixed guess until there's real data to scale to
    chart.options.scales.y.min = -Y_MAX.speed[currentUnit];
  } else {
    chart.options.scales.y.max = Y_MAX.distance[currentUnit];
    chart.options.scales.y.min = 0;
  }
  chart.options.scales.y.title.text = graphMode === 'speed'
    ? `Speed (${currentUnit}/s)` : `Distance (${currentUnit})`;
  chart.update();
}

function setUnit(unit) {
  if (unit === currentUnit) return;
  const prevUnit = currentUnit;
  currentUnit = unit;
  Units.setPref({ dist: currentUnit });
  unitsBtnValue.textContent = currentUnit;
  distUnit.textContent = currentUnit === 'm' ? 'meters' : 'feet';
  // Retroactively convert already-plotted points so the graph stays
  // consistent rather than showing a mix of units. Works for speed values
  // too — the ft→m conversion factor applies the same way since time is
  // unit-independent.
  data = data.map(([t,d]) => [t, convertDist(d, prevUnit, currentUnit)]);
  chart.data.datasets.forEach(ds => {
    ds.data = ds.data.map(pt => ({ x: pt.x, y: convertDist(pt.y, prevUnit, currentUnit) }));
  });
  if (cachedDistanceData) {
    cachedDistanceData = cachedDistanceData.map(([t,d]) => [t, convertDist(d, prevUnit, currentUnit)]);
  }
  pinnedPoints = []; hoverPreview = null; // these weren't unit-converted, so clear rather than leave them off the line
  if (tableOn) rebuildTable();
  updateTableHeader();
  applyAxisConfig();
}
unitsBtn.onclick = () => setUnit(currentUnit === 'ft' ? 'm' : 'ft');

function setGraphMode(mode) {
  if (mode === graphMode) return;
  const prevMode = graphMode;
  graphMode = mode;
  graphModeBtnValue.textContent = mode === 'speed' ? 'Speed' : 'Dist';

  if (mode === 'speed' && prevMode === 'distance' && data.length >= 2) {
    // Redraw as speed, derived from the distance data just recorded —
    // cache the original first so switching back is a lossless restore,
    // not an attempt to integrate speed back into distance (which would
    // compound tracking noise rather than undo it).
    cachedDistanceData = data;
    data = deriveSpeedFromDistance(cachedDistanceData, tableInterval);
  } else if (mode === 'distance' && prevMode === 'speed' && cachedDistanceData) {
    data = cachedDistanceData;
    cachedDistanceData = null;
  } else {
    // Nothing sensible to derive/restore (empty data, or a fresh start
    // directly in this mode) — same clean-slate behavior as before.
    data = [];
    cachedDistanceData = null;
  }

  dataTableBody.innerHTML = '';
  chart.data.datasets = [motionDataset()];
  chart.data.datasets[0].data = graphMode === 'speed'
    ? chartPointsWithZeroCrossings(data)
    : data.map(([t,v]) => ({ x: t, y: v }));
  pinnedPoints = []; hoverPreview = null;
  updateTableHeader();
  applyAxisConfig();
  if (tableOn) rebuildTable();
}
graphModeBtn.onclick = () => setGraphMode(graphMode === 'distance' ? 'speed' : 'distance');
setGraphMode('distance'); // initialize button label state

// Apply saved unit preference on load
unitsBtnValue.textContent = currentUnit;
distUnit.textContent = currentUnit === 'm' ? 'meters' : 'feet';

clearBtn.onclick=()=>{
  if(countingDown){clearTimeout(preDelayTimer);clearInterval(countdownTimer);countdownOverlay.classList.remove('visible');countingDown=false;}
  recording=false; startBtn.disabled=false; startBtn.textContent='▶ Start'; data=[]; cachedDistanceData=null;
  dataTableBody.innerHTML='';
  chart.options.scales.x.max = INITIAL_WINDOW;
  chart.options.scales.x.min = negTimeOn ? NEG_TIME_MIN : 0;
  chart.data.datasets=[motionDataset()];
  pinnedPoints = []; hoverPreview = null;
  chart.update();
  smooth=MotionTracker.createSmoother(); lastRecordTime=-Infinity; calcSlope=MotionTracker.createSlopeCalc();
  statusDot.classList.remove('recording');
  distReadout.textContent='--';
  drawArrow(0,0);
  slopeReadout.textContent='0.0'; slopeReadout.className='zero';
  slopeDirLabel.textContent='—';
};
</script>
</body>
